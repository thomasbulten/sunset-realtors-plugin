name: Build and Deploy ZIP

on:
  push:
    branches:
      - beta
      - main

env:
  BRANCH_NAME: ${{ github.ref_name }}
  REPO_NAME: ${{ github.event.repository.name }}
  ZIP_NAME: ${{ github.event.repository.name }}-${{ github.ref_name }}.zip

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install PHP dependencies
        run: |
          composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader

      - name: Install dependencies and build assets
        run: |
          npm ci
          npm run build
          rm -rf node_modules

      - name: Create ZIP
        run: |
          mkdir -p "$REPO_NAME"
          shopt -s extglob
          mv !("$REPO_NAME") "$REPO_NAME"/
          zip -r "$ZIP_NAME" "$REPO_NAME" \
            --exclude "*/.*" \
            --exclude "*.git*" \
            --exclude "*.psd" \
            --exclude "*.yml" \
            --exclude "*.zip" \
            --exclude "$REPO_NAME/.env" \
            --exclude "$REPO_NAME/README.md" \
            --exclude "$REPO_NAME/$REPO_NAME.json" \
            --exclude "$REPO_NAME/phpcs.xml.dist" \
            --exclude "$REPO_NAME/postcss.config.cjs"

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload ZIP to remote server via FTP
        run: |
          curl --upload-file "$ZIP_NAME" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "${{ secrets.FTP_URL_PLUGINS }}"

      - name: Prepare plugin JSON
        id: version
        run: |
          PLUGIN_FILE="$REPO_NAME/$REPO_NAME.php"
          VERSION=$(grep -m1 'Version:' "$PLUGIN_FILE" | sed -E 's/.*Version:[[:space:]]*([^[:space:]]+).*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Version not found in $PLUGIN_FILE" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

          TIMESTAMP=$(TZ=Europe/Amsterdam date '+%Y-%m-%d %H:%M:%S')
          if [ "$BRANCH_NAME" = "beta" ]; then
            jq --arg v "$VERSION" --arg ts "$TIMESTAMP" \
              '.version_beta = $v | .last_updated = $ts' \
              "$REPO_NAME/$REPO_NAME.json" > tmp.json
          else
            jq --arg v "$VERSION" --arg ts "$TIMESTAMP" \
              '.version = $v | .last_updated = $ts' \
              "$REPO_NAME/$REPO_NAME.json" > tmp.json
          fi
          mv tmp.json "$REPO_NAME/$REPO_NAME.json"

      - name: Upload JSON to remote server via FTP
        run: |
          curl --upload-file "$REPO_NAME/$REPO_NAME.json" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "${{ secrets.FTP_URL_PLUGINS }}"

      - name: Check if release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.value }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.release_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.value }}" \
            "$ZIP_NAME" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.version.outputs.value }}" \
            --prerelease \
            --generate-notes
